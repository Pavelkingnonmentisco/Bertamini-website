<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL | OFFICIAL</title>
    <style>
        :root {
            --accent: #FFD700;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(25, 25, 25, 0.95); 
            --text: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LOGIN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            width: 340px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* --- NAVBAR --- */
        nav {
            background: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { height: 40px; width: 40px; border-radius: 50%; border: 1px solid var(--accent); }
        .nav-links { display: flex; gap: 12px; }

        nav button {
            background: transparent;
            color: #aaa;
            border: 1px solid transparent;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            font-size: 12px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        nav button:hover { color: var(--accent); border-color: rgba(255, 215, 0, 0.3); }

        /* --- IMMAGINI INTESTAZIONE --- */
        .section-banner {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* --- CONTAINER --- */
        .container { padding: 40px 20px; max-width: 1000px; margin: auto; flex: 1; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; text-align: left; }
        
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .card h3 { color: #888; margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .card p { font-size: 24px; margin: 10px 0; font-weight: 700; color: var(--accent); }

        .m-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .m-table th { background: #151515; color: var(--accent); padding: 15px; text-align: left; font-size: 12px; border-bottom: 1px solid #333; }
        .m-table td { padding: 14px 15px; border-bottom: 1px solid #222; font-size: 14px; text-align: left; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; 
            box-sizing: border-box;
        }
        
        .btn-primary { 
            width: 100%; padding: 12px; background: var(--accent); color: #000; 
            border: none; font-weight: 700; border-radius: 6px; cursor: pointer; 
            text-transform: uppercase;
        }

        #timer-val { font-size: 72px; font-weight: 800; margin: 20px 0; color: #fff; letter-spacing: -2px; display: block;}
        footer { padding: 30px; text-align: center; font-size: 11px; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="80">
            <h2 style="margin: 20px 0; font-size: 18px; letter-spacing: 1px;">STAFF PORTAL</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">Accedi</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
                <span style="font-weight: 800; font-size: 14px; letter-spacing: 1px;">ITDR</span>
            </div>
            <div class="nav-links">
                <button onclick="tab('area')">Home</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('turni')">Turni</button>
                <button onclick="tab('matricole')">Matricole</button>
                <button id="adm-btn" class="hidden" style="color:var(--accent)" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
        </nav>

        <div class="container">
            <section id="area">
                <img src="https://i.ibb.co/39QGy4NM/Area-Personale.png" class="section-banner" alt="Area Personale">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Ore Totali</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>Sanzioni</h3><p id="u-warns" style="color:var(--danger)">0</p></div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <img src="https://i.ibb.co/hxJ3wNy9/Duty-Staff.png" class="section-banner" alt="Duty Staff">
                <div class="card" style="max-width: 500px; margin: auto; text-align: center;">
                    <h3>Cronometro Servizio</h3>
                    <span id="timer-val">00:00:00</span>
                    <div style="display:flex; gap:10px;">
                        <button id="t-btn" class="btn-primary" onclick="toggleT()">Inizia Turno</button>
                        <button id="p-btn" class="btn-primary hidden" style="background:#333; color:#fff;" onclick="togglePause()">Pausa</button>
                    </div>
                </div>
            </section>

            <section id="turni" class="hidden">
                <img src="https://i.ibb.co/bgY9swvP/Calendario-Turni.png" class="section-banner" alt="Calendario Turni">
                <div class="card" style="margin-bottom: 20px; text-align: left;">
                    <select id="view-day" onchange="showDay(this.value)" style="margin:0;">
                        <option value="">Seleziona Giorno</option>
                        <option value="Lunedi">Lunedì</option><option value="Martedi">Martedì</option><option value="Mercoledi">Mercoledì</option><option value="Giovedi">Giovedì</option><option value="Venerdi">Venerdì</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                    </select>
                </div>
                <div class="grid">
                    <div class="card"><h3>Fascia Pomeridiana</h3><p id="p-list" style="font-size:16px;">-</p></div>
                    <div class="card"><h3>Fascia Serale</h3><p id="s-list" style="font-size:16px;">-</p></div>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <h2 style="color: var(--accent); letter-spacing: 2px;">DATABASE MATRICOLE</h2>
                <table class="m-table">
                    <thead><tr><th>MATRICOLA</th><th>STAFFER</th><th>GRADO</th><th>SANC.</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="grid">
                    <div class="card">
                        <h3>Modifica Staffer</h3>
                        <select id="s-sel" onchange="loadStaffData()"><option value="">Seleziona...</option></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="text" id="ed-m" placeholder="Matricola">
                        <input type="number" id="ed-h" placeholder="Secondi totali">
                        <button class="btn-primary" onclick="saveStaffData()">Salva Modifiche</button>
                    </div>
                    <div class="card">
                        <h3>Gestione Calendario</h3>
                        <select id="e-day">
                            <option value="Lunedi">Lunedì</option><option value="Martedi">Martedì</option><option value="Mercoledi">Mercoledì</option><option value="Giovedi">Giovedì</option><option value="Venerdi">Venerdì</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                        </select>
                        <textarea id="e-p" placeholder="Pomeriggio..."></textarea>
                        <textarea id="e-s" placeholder="Sera..."></textarea>
                        <button class="btn-primary" onclick="saveT()">Aggiorna Turni</button>
                    </div>
                </div>
            </section>
        </div>
        <footer>© 2026 ITDR PORTAL | Powered by Pavel</footer>
    </div>

    <script>
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel", "Diego", "Barone", "Hydro"];
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1480953347941990512/tO72Y7nUOLn0atj93WQfdwrpvOw1213-opTl7hBTmunCVvht4Ck6lJcvb_7GPm-ZcLmr";

        let db = JSON.parse(localStorage.getItem('ITDR_DB_V39')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_TR_V39')) || { "Lunedi":{p:"-",s:"-"}, "Martedi":{p:"-",s:"-"}, "Mercoledi":{p:"-",s:"-"}, "Giovedi":{p:"-",s:"-"}, "Venerdi":{p:"-",s:"-"}, "Sabato":{p:"-",s:"-"}, "Domenica":{p:"-",s:"-"} };

        if(Object.keys(db).length === 0) {
            const STAFF_DATA = [
                ["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],
                ["Arduino","Owner","ITD-04"],["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],
                ["Djsamy","Community Manager","ITD-07"],["Cobra","Community Manager","ITD-08"],["Baj","Server Supervisor","ITD-09"],
                ["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"],
                ["Diego","Supervisor","ITD-13"],["Barone","Head Admin","ITD-14"],["Hydro","Head Admin","ITD-15"],
                ["Fabbri","Senior Admin","ITD-16"],["Matz","Senior Admin","ITD-17"],["Nathalino","Senior Admin","ITD-18"],
                ["Viper","Admin","ITD-19"],["Xenoo","Admin","ITD-20"],["Adamo","Head Mod","ITD-21"],
                ["Nano","Moderator","ITD-22"],["Gabriel","Moderator","ITD-23"],["Chorno","Moderator","ITD-24"],
                ["Joker","Moderator","ITD-25"],["Nenne","Trial Mod","ITD-26"],["Mattia","Trial Mod","ITD-27"],
                ["Lollo","Senior Helper","ITD-28"],["Simo","Helper","ITD-29"],["Vortex","Helper","ITD-30"],
                ["Void","Helper","ITD-31"],["Sangue","Trial Helper","ITD-32"],["Ibra","Trial Helper","ITD-33"],
                ["Noxen","Trial Helper","ITD-34"],["Ash","Trial Helper","ITD-35"],["Pietro","Trial Helper","ITD-36"]
            ];
            STAFF_DATA.forEach(s => { db[s[0]] = { pass: s[0]+"-01", grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            save();
        }

        let user = null, sec = 0, interval = null, on = false, isPaused = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole();
            } else alert("Dati non validi.");
        }

        async function sendLog(tipo, sessione = 0) {
            if(!DISCORD_WEBHOOK) return;
            const now = new Date();
            let description = "";
            let color = tipo === "INIZIO" ? 16766720 : 16711680;

            if (tipo === "INIZIO") {
                description = `📥 **ENTRATA IN SERVIZIO – STAFF**\n👤 Operatore: <@${db[user].mat.replace('ITD-', '')}>\n🆔 ID Operatore: ${db[user].mat}\n🏷️ Ruolo: ${db[user].grado}\n⏰ Orario Entrata: ${now.toLocaleDateString('it-IT')} - ${now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}`;
            } else {
                const start = new Date(now - sessione * 1000);
                description = `📤 **USCITA DAL SERVIZIO – STAFF**\n👤 Operatore: <@${db[user].mat.replace('ITD-', '')}>\n🆔 ID Operatore: ${db[user].mat}\n🏷️ Ruolo: ${db[user].grado}\n⏰ Orario Entrata: ${start.toLocaleDateString('it-IT')} - ${start.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}\n⏰ Orario Uscita: ${now.toLocaleDateString('it-IT')} - ${now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}\n⏳ Durata Totale: ${fmt(sessione)}`;
            }

            fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [{ description, color, timestamp: new Date() }] }) });
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            let pBtn = document.getElementById('p-btn');
            if(!on) {
                on = true; b.innerText = "Fine Turno"; b.style.background = "var(--danger)";
                pBtn.classList.remove('hidden'); startTimer(); sendLog("INIZIO");
            } else {
                on = false; b.innerText = "Inizia Turno"; b.style.background = "var(--accent)";
                pBtn.classList.add('hidden'); clearInterval(interval);
                db[user].ore += sec; sendLog("FINE", sec);
                sec = 0; document.getElementById('timer-val').innerText = "00:00:00";
                save(); updateArea();
            }
        }

        function startTimer() { interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000); }
        function togglePause() {
            let pBtn = document.getElementById('p-btn');
            if(!isPaused) { isPaused = true; clearInterval(interval); pBtn.innerText = "Riprendi"; }
            else { isPaused = false; startTimer(); pBtn.innerText = "Pausa"; }
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('ITDR_DB_V39', JSON.stringify(db)); localStorage.setItem('ITDR_TR_V39', JSON.stringify(tr)); }
        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function showDay(d) { if(d) { document.getElementById('p-list').innerText = tr[d].p; document.getElementById('s-list').innerText = tr[d].s; } }
        function renderMatricole() {
            let b = document.getElementById('m-body');
            const sorted = Object.keys(db).sort((x,y) => db[x].mat.localeCompare(db[y].mat, undefined, {numeric: true}));
            b.innerHTML = sorted.map(k => `<tr><td><b>${db[k].mat}</b></td><td>${k}</td><td>${db[k].grado}</td><td>${db[k].warns || 0}</td></tr>`).join('');
        }
        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
            document.getElementById('u-warns').innerText = db[user].warns || 0;
        }
        function refreshAdmList() {
            let s = document.getElementById('s-sel'); s.innerHTML = '<option value="">Scegli...</option>';
            Object.keys(db).sort().forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        }
        function loadStaffData() {
            let s = document.getElementById('s-sel').value; if(!s) return;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-m').value = db[s].mat;
            document.getElementById('ed-h').value = db[s].ore;
        }
        function saveStaffData() {
            let s = document.getElementById('s-sel').value; if(!s) return;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].mat = document.getElementById('ed-m').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); renderMatricole(); alert("Salvato!");
        }
        function saveT() {
            let d = document.getElementById('e-day').value;
            tr[d] = { p: document.getElementById('e-p').value, s: document.getElementById('e-s').value };
            save(); alert("Calendario Aggiornato!");
        }
    </script>
</body>
</html>
