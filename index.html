<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LS STAFF PORTAL v44.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --sidebar: #080808; --accent: #ff7b00; --teal: #4ecdc4; --border: #222; }
        body { background: var(--bg); color: var(--accent); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* SIDEBAR */
        aside { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
        .logo-area { text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo-area img { width: 70px; filter: drop-shadow(0 0 5px var(--accent)); }
        nav { flex: 1; padding: 20px 0; }
        nav button { width: 100%; background: transparent; border: none; color: #888; padding: 15px 20px; text-align: left; cursor: pointer; font-family: inherit; text-transform: uppercase; font-size: 13px; }
        nav button:hover, nav button.active { color: var(--teal); border-right: 3px solid var(--teal); background: rgba(78,205,196,0.05); }

        /* MAIN */
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .header-title { border-bottom: 1px solid var(--accent); margin-bottom: 30px; padding-bottom: 10px; }
        .header-title h1 { margin: 0; font-size: 28px; color: var(--accent); }

        /* GRID DASHBOARD */
        .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .panel { background: #0a0a0a; border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        .panel h3 { font-size: 12px; color: #555; margin: 0 0 10px 0; text-transform: uppercase; }
        .val { font-size: 24px; color: var(--teal); }

        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--accent); color: var(--teal); padding: 12px; margin: 10px 0; font-family: inherit; }
        .btn-ls { background: transparent; border: 1px solid var(--teal); color: var(--teal); padding: 12px; cursor: pointer; font-family: inherit; text-transform: uppercase; width: 100%; }
        .btn-ls:hover { background: var(--teal); color: #000; box-shadow: 0 0 15px var(--teal); }
        
        table { width: 100%; border-collapse: collapse; color: var(--teal); font-size: 13px; }
        th { border-bottom: 1px solid var(--accent); padding: 10px; text-align: left; color: var(--accent); }
        td { padding: 10px; border-bottom: 1px solid #111; }
        
        .log-entry { border-left: 3px solid var(--accent); background: #0d0d0d; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .roblox-img { width: 50px; height: 50px; border: 1px solid var(--teal); }
        footer { position: fixed; bottom: 10px; right: 20px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <div id="login-screen" style="position:fixed; inset:0; background:#000; z-index:999; display:flex; align-items:center; justify-content:center;">
        <div class="panel" style="width:300px; text-align:center;">
            <h2 style="color:var(--accent)">LS STAFF LOGIN</h2>
            <input type="text" id="user-in" placeholder="NOME UTENTE">
            <input type="password" id="pass-in" placeholder="PASSWORD">
            <button class="btn-ls" onclick="login()">ENTRA</button>
        </div>
    </div>

    <aside class="hidden" id="sidebar">
        <div class="logo-area"><img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp"></div>
        <nav>
            <button onclick="tab('area')" id="btn-area">DASHBOARD</button>
            <button onclick="tab('servizio')" id="btn-servizio">SERVIZIO</button>
            <button onclick="tab('banwarn')" id="btn-banwarn">BAN & WARN</button>
            <button onclick="tab('turni')" id="btn-turni">TURNI</button>
            <button onclick="tab('matricole')" id="btn-matricole">MATRICOLE</button>
            <button id="adm-btn" class="hidden" onclick="tab('admin')" style="color:var(--accent)">ADMIN</button>
            <button onclick="location.reload()" style="margin-top:20px; color:#ff4d4d;">DISCONNETTI</button>
        </nav>
    </aside>

    <main class="hidden" id="main-content">
        <div id="area">
            <div class="header-title"><h1>DASHBOARD STAFF</h1></div>
            <div class="dash-grid">
                <div class="panel"><h3>GRADO OPERATIVO</h3><div id="d-grado" class="val">-</div></div>
                <div class="panel"><h3>MATRICOLA</h3><div id="d-mat" class="val">-</div></div>
                <div class="panel"><h3>ORE SERVIZIO</h3><div id="d-ore" class="val">0.00</div></div>
                <div class="panel"><h3>SANZIONI</h3><div id="d-warn" class="val" style="color:red">0</div></div>
            </div>
        </div>

        <div id="servizio" class="hidden">
            <div class="header-title"><h1>FIRMA PRESENZE</h1></div>
            <div class="panel" style="text-align:center;">
                <div id="timer-display" style="font-size:40px; margin-bottom:20px;">00:00:00</div>
                <button id="t-btn" class="btn-ls" onclick="toggleT()">INIZIA TURNO</button>
            </div>
        </div>

        <div id="banwarn" class="hidden">
            <div class="header-title"><h1>MODERAZIONE</h1></div>
            <div class="panel">
                <input type="text" id="rbx-name" placeholder="NOME UTENTE ROBLOX">
                <select id="mod-type"><option value="BAN">BAN</option><option value="WARN">WARN</option></select>
                <textarea id="mod-reason" placeholder="MOTIVO..."></textarea>
                <button class="btn-ls" onclick="submitMod()">INVIA</button>
            </div>
            <div id="mod-logs"></div>
        </div>

        <div id="turni" class="hidden">
            <div class="header-title"><h1>TURNI</h1></div>
            <select id="view-day" onchange="showDay(this.value)"><option value="">GIORNO...</option><option value="Lunedi">LUNEDÌ</option><option value="Martedi">MARTEDÌ</option><option value="Mercoledi">MERCOLEDÌ</option><option value="Giovedi">GIOVEDÌ</option><option value="Venerdi">VENERDÌ</option><option value="Sabato">SABATO</option><option value="Domenica">DOMENICA</option></select>
            <div class="panel"><h3>POMERIGGIO</h3><p id="p-list">-</p><h3>SERA</h3><p id="s-list">-</p></div>
        </div>

        <div id="matricole" class="hidden">
            <div class="header-title"><h1>DATABASE MATRICOLE</h1></div>
            <table><thead><tr><th>MATRICOLA</th><th>NOME</th><th>GRADO</th></tr></thead><tbody id="m-body"></tbody></table>
        </div>

        <div id="admin" class="hidden">
            <div class="header-title"><h1>ADMIN PANEL</h1></div>
            <button class="btn-ls" onclick="generateRandomTurni()">GENERA TURNI SETTIMANA</button>
        </div>
        <footer>TUTTI I DIRITTI RISERVATI A PAVEL</footer>
    </main>

    <script>
        const WH_MOD = "https://discord.com/api/webhooks/1480953347941990512/tO72Y7nUOLn0atj93WQfdwrpvOw1213-opTl7hBTmunCVvht4Ck6lJcvb_7GPm-ZcLmr";
        
        const INITIAL_STAFF = [
            ["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],
            ["Arduino","Owner","ITD-04"],["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],
            ["Baj","Server Supervisor","ITD-07"],["Cobra","Community Manager","ITD-08"],["Djsamy","Community Manager","ITD-09"],
            ["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"],
            ["Diego","Supervisor","ITD-13"],["Barone","Head Admin","ITD-14"],["Hydro","Head Admin","ITD-15"],
            ["Fabbri","Senior Admin","ITD-16"],["Matz","Senior Admin","ITD-17"],["Nathalino","Senior Admin","ITD-18"],
            ["Viper","Admin","ITD-19"],["Xenoo","Admin","ITD-20"],["Adam","Head Mod","ITD-21"],["Adamo","Head Mod","ITD-22"],
            ["Nano","Moderator","ITD-23"],["Gabriel","Moderator","ITD-24"],["Chorno","Moderator","ITD-25"],
            ["Joker","Moderator","ITD-26"],["Nenne","Trial Mod","ITD-27"],["Mattia","Trial Mod","ITD-28"],
            ["Lollo","Senior Helper","ITD-29"],["Simo","Helper","ITD-30"],["Vortex","Helper","ITD-31"],
            ["Void","Helper","ITD-32"],["Sangue","Trial Helper","ITD-33"],["Ibra","Trial Helper","ITD-34"],
            ["Noxen","Trial Helper","ITD-35"],["Ash","Trial Helper","ITD-36"],["Pietro","Trial Helper","ITD-37"]
        ];

        let db = JSON.parse(localStorage.getItem('LS_DB_V44')) || {};
        let tr = JSON.parse(localStorage.getItem('LS_TR_V44')) || {};
        let logs = JSON.parse(localStorage.getItem('LS_LOGS_V44')) || [];
        let user = null, sec = 0, interval = null, on = false;

        // Inizializza DB se vuoto
        if(Object.keys(db).length === 0) {
            INITIAL_STAFF.forEach(s => { db[s[0]] = { grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            localStorage.setItem('LS_DB_V44', JSON.stringify(db));
        }

        function login() {
            let u = document.getElementById('user-in').value.trim();
            if(db[u]) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                // Admin access per i primi 13 (fino a Diego)
                const adminGrades = ["Founder", "Owner", "Co Owner", "Co-Founder", "Server Supervisor", "Community Manager", "Staff Manager", "Supervisor"];
                if(adminGrades.includes(db[u].grado)) document.getElementById('adm-btn').classList.remove('hidden');
                updateUI(); renderLogs(); tab('area');
            } else alert("UTENTE NON TROVATO IN MATRICOLA");
        }

        async function submitMod() {
            const rbxName = document.getElementById('rbx-name').value.trim();
            const type = document.getElementById('mod-type').value;
            const reason = document.getElementById('mod-reason').value;
            if(!rbxName || !reason) return;

            const avatarUrl = `https://www.roblox.com/headshot-thumbnail/image?width=420&height=420&format=png&username=${rbxName}`;
            const log = { rbxName, type, reason, staff: user, time: new Date().toLocaleString(), img: avatarUrl };
            logs.unshift(log);
            localStorage.setItem('LS_LOGS_V44', JSON.stringify(logs));

            fetch(WH_MOD, { method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({embeds: [{ title: `🛡️ MOD: ${type}`, description: `**User:** ${rbxName}\n**Staff:** ${user}\n**Motivo:** ${reason}`, thumbnail: {url: avatarUrl}, color: 16744192, timestamp: new Date()}]})
            });
            renderLogs();
        }

        function renderLogs() {
            document.getElementById('mod-logs').innerHTML = logs.map(l => `<div class="log-entry"><img src="${l.img}" class="roblox-img"><div><strong>${l.type}: ${l.rbxName}</strong><br><small>Motivo: ${l.reason}</small></div></div>`).join('');
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            if(!on) { on = true; b.innerText = "CHIUDI TURNO"; interval = setInterval(() => { sec++; document.getElementById('timer-display').innerText = fmt(sec); }, 1000); }
            else { on = false; b.innerText = "INIZIA TURNO"; clearInterval(interval); db[user].ore += (sec / 3600); sec = 0; document.getElementById('timer-display').innerText = "00:00:00"; save(); updateUI(); }
        }

        function updateUI() {
            document.getElementById('d-grado').innerText = db[user].grado;
            document.getElementById('d-mat').innerText = db[user].mat;
            document.getElementById('d-ore').innerText = (db[user].ore || 0).toFixed(2);
            document.getElementById('d-warn').innerText = db[user].warns;
            document.getElementById('m-body').innerHTML = Object.keys(db).map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td></tr>`).join('');
        }

        function generateRandomTurni() {
            const pool = Object.keys(db).filter(k => db[k].mat.includes("ITD-14") || db[k].mat.includes("ITD-37")); // Filtra staffer operativi
            ["Lunedi","Martedi","Mercoledi","Giovedi","Venerdi","Sabato","Domenica"].forEach(g => {
                let r = [...pool].sort(() => 0.5 - Math.random());
                tr[g] = { p: r.slice(0, 3).join(", "), s: r.slice(3, 6).join(", ") };
            });
            localStorage.setItem('LS_TR_V44', JSON.stringify(tr));
            alert("TURNI GENERATI");
        }

        function showDay(d) { if(tr[d]) { document.getElementById('p-list').innerText = tr[d].p; document.getElementById('s-list').innerText = tr[d].s; } }
        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('LS_DB_V44', JSON.stringify(db)); }
        function tab(id) { document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>
</html>
