<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v32.0 | 2026</title>
    <style id="custom-theme">
        :root {
            --gold: #D4AF37;
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
            --danger: #ff4d4d;
            --glass: rgba(212, 175, 55, 0.1);
        }
    </style>
    <style>
        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LOGIN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154953/eb3pca3vvbnearhoockt.webp');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            width: 360px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        /* --- NAVBAR --- */
        nav {
            background: #050505;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; flex: 1; }

        nav button {
            background: var(--glass);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 10px;
        }

        nav button:hover { background: var(--gold); color: #000; }

        /* --- LAYOUT --- */
        .container { padding: 30px; max-width: 1200px; margin: auto; text-align: center; flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .card h3 { color: var(--gold); margin: 0; font-size: 11px; text-transform: uppercase; }
        .card p { font-size: 22px; margin: 10px 0; font-weight: bold; }

        .img-header { width: 100%; max-width: 550px; border-radius: 15px; margin-bottom: 30px; border: 2px solid var(--gold); }

        .m-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); }
        .m-table th { background: var(--gold); color: black; padding: 15px; text-align: left; font-size: 12px; }
        .m-table td { padding: 12px 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); text-align: left; }

        /* --- ADMIN --- */
        .admin-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            text-align: left; 
            align-items: start;
        }
        .admin-card { 
            background: #080808; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            height: fit-content;
        }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box;
        }
        
        .btn-primary { width: 100%; padding: 12px; background: var(--gold); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-warn { background: #b8860b; color: #fff; }

        #timer-val { font-size: 70px; font-weight: 900; margin: 20px 0; display: block; color: var(--gold); }
        footer { background: #050505; padding: 15px; text-align: center; font-size: 11px; color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="90">
            <h2 style="color:var(--gold)">ITDR STAFF PORTAL</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">ACCEDI</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <img src="" class="nav-logo logo-img">
            <div class="nav-links">
                <button onclick="tab('area')">Home</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('turni')">Turni</button>
                <button onclick="tab('matricole')">Membri</button>
                <button id="adm-btn" class="hidden" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
            <img src="" class="nav-logo logo-img">
        </nav>

        <div class="container">
            <section id="area">
                <img src="" class="img-header banner-home">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Tempo di Servizio</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>Sanzioni</h3><p id="u-warns" style="color:var(--danger)">0</p></div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <img src="" class="img-header banner-servizio">
                <div class="card">
                    <span id="timer-val">00:00:00</span>
                    <div style="display:flex; gap:10px; max-width:400px; margin:auto;">
                        <button id="t-btn" class="btn-primary" onclick="toggleT()">INIZIA</button>
                        <button id="p-btn" class="btn-primary btn-warn hidden" onclick="togglePause()">PAUSA</button>
                    </div>
                </div>
            </section>

            <section id="turni" class="hidden">
                <div class="grid">
                    <div class="card"><h3>Seleziona Giorno</h3>
                        <select id="view-day" onchange="showDay(this.value)">
                            <option value="">Scegli...</option>
                            <option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option><option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option><option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                        </select>
                    </div>
                </div>
                <div class="grid">
                    <div class="card"><h3>Pomeriggio</h3><p id="p-list">-</p></div>
                    <div class="card"><h3>Sera</h3><p id="s-list">-</p></div>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <img src="" class="img-header banner-membri">
                <table class="m-table">
                    <thead><tr><th>Mat.</th><th>Staffer</th><th>Grado</th><th>Sanzioni</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3 style="color:var(--gold)">🎨 DESIGN & ESTETICA</h3>
                        <label style="font-size: 11px;">Colore Principale:</label>
                        <input type="color" id="cfg-color" onchange="updateTheme()">
                        <input type="text" id="cfg-logo" placeholder="URL Logo Navigazione" onchange="updateTheme()">
                        <input type="text" id="cfg-b-home" placeholder="URL Banner Home" onchange="updateTheme()">
                        <input type="text" id="cfg-b-serv" placeholder="URL Banner Servizio" onchange="updateTheme()">
                        <input type="text" id="cfg-b-memb" placeholder="URL Banner Membri" onchange="updateTheme()">
                        <button class="btn-primary" onclick="saveTheme()">SALVA ESTETICA</button>
                    </div>

                    <div class="admin-card">
                        <h3 style="color:var(--gold)">GESTIONE STAFF</h3>
                        <select id="s-sel" onchange="loadStaffData()"><option value="">Scegli...</option></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="text" id="ed-m" placeholder="Matricola">
                        <input type="number" id="ed-h" placeholder="Secondi totali">
                        <button class="btn-primary" onclick="saveStaffData()">AGGIORNA</button>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button class="btn-primary btn-warn" onclick="changeWarns(1)">+1 Warn</button>
                            <button class="btn-primary btn-danger" onclick="changeWarns(-1)">-1 Warn</button>
                        </div>
                    </div>

                    <div class="admin-card">
                        <h3 style="color:var(--gold)">AGGIUNGI MEMBRO</h3>
                        <input type="text" id="new-u" placeholder="Nome">
                        <input type="text" id="new-g" placeholder="Grado">
                        <input type="text" id="new-m" placeholder="Matricola">
                        <button class="btn-primary" onclick="addMember()">AGGIUNGI</button>
                    </div>
                </div>
            </section>
        </div>
        <footer>© 2026 ITDR Staff Portal | Powered by Pavel</footer>
    </div>

    <script>
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1480996793096605838/avlMEkY5vYoM-fTkLQKovYhQTGh-JXzH9dquQhPMqMYaKvUcQV2feXb4rtvADz42rai-";
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel"];

        let db = JSON.parse(localStorage.getItem('ITDR_V27_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V27_TR')) || { "Lunedi":{p:"-",s:"-"}, "Martedi":{p:"-",s:"-"}, "Mercoledi":{p:"-",s:"-"}, "Giovedi":{p:"-",s:"-"}, "Venerdi":{p:"-",s:"-"}, "Sabato":{p:"-",s:"-"}, "Domenica":{p:"-",s:"-"} };
        
        // Caricamento Tema
        let theme = JSON.parse(localStorage.getItem('ITDR_THEME')) || {
            color: "#D4AF37",
            logo: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif",
            bHome: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154806/xtb9kcfg5ian3x9fiq9w.gif",
            bServ: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773150993/dp66lxgcjwmtonwpc9gc.png",
            bMemb: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773150993/dp66lxgcjwmtonwpc9gc.png"
        };

        if(Object.keys(db).length === 0) {
            db["Pavel"] = { pass: "Pavel-01", grado: "Supervisor", mat: "ITD-12", ore: 0, warns: 0 };
            save();
        }

        let user = null, sec = 0, interval = null, on = false, isPaused = false;

        function applyTheme() {
            document.getElementById('custom-theme').innerHTML = `:root { --gold: ${theme.color}; --dark-bg: #000000; --card-bg: #0a0a0a; --danger: #ff4d4d; --glass: rgba(212, 175, 55, 0.1); }`;
            document.querySelectorAll('.logo-img').forEach(img => img.src = theme.logo);
            document.querySelector('.banner-home').src = theme.bHome;
            document.querySelector('.banner-servizio').src = theme.bServ;
            document.querySelector('.banner-membri').src = theme.bMemb;
            
            document.getElementById('cfg-color').value = theme.color;
            document.getElementById('cfg-logo').value = theme.logo;
            document.getElementById('cfg-b-home').value = theme.bHome;
            document.getElementById('cfg-b-serv').value = theme.bServ;
            document.getElementById('cfg-b-memb').value = theme.bMemb;
        }

        function updateTheme() {
            theme.color = document.getElementById('cfg-color').value;
            theme.logo = document.getElementById('cfg-logo').value;
            theme.bHome = document.getElementById('cfg-b-home').value;
            theme.bServ = document.getElementById('cfg-b-serv').value;
            theme.bMemb = document.getElementById('cfg-b-memb').value;
            applyTheme();
        }

        function saveTheme() { localStorage.setItem('ITDR_THEME', JSON.stringify(theme)); alert("Estetica salvata!"); }

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole(); applyTheme();
            } else alert("Dati errati!");
        }

        async function sendLog(tipo, sessione = 0) {
            if(!DISCORD_WEBHOOK) return;
            const now = new Date().toLocaleTimeString('it-IT');
            let embed = {
                username: "ITDR LOG SYSTEM",
                embeds: [{
                    title: tipo === "INIZIO" ? "🚀 STAFF ENTRATO IN SERVIZIO" : "🏁 STAFF USCITO DAL SERVIZIO",
                    color: tipo === "INIZIO" ? 55295 : 16711680,
                    fields: [
                        { name: "Nome staffer", value: user, inline: true },
                        { name: "Matricola", value: db[user].mat, inline: true },
                        { name: tipo === "INIZIO" ? "Orario di inizio" : "Orario Fine", value: now, inline: false }
                    ],
                    timestamp: new Date()
                }]
            };
            if(tipo === "FINE") {
                embed.embeds[0].fields.push({ name: "Sessione", value: fmt(sessione), inline: true });
                embed.embeds[0].fields.push({ name: "Totale", value: fmt(db[user].ore), inline: true });
            }
            fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(embed) });
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            let pBtn = document.getElementById('p-btn');
            if(!on) {
                on = true; isPaused = false;
                b.innerText = "FINE"; b.classList.add('btn-danger');
                pBtn.classList.remove('hidden');
                interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000);
                sendLog("INIZIO");
            } else {
                on = false; b.innerText = "INIZIA"; b.classList.remove('btn-danger');
                pBtn.classList.add('hidden');
                clearInterval(interval);
                db[user].ore += sec;
                sendLog("FINE", sec);
                sec = 0; document.getElementById('timer-val').innerText = "00:00:00";
                save(); updateArea();
            }
        }

        function togglePause() {
            let pBtn = document.getElementById('p-btn');
            if(!isPaused) { isPaused = true; clearInterval(interval); pBtn.innerText = "RIPRENDI"; }
            else { isPaused = false; interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000); pBtn.innerText = "PAUSA"; }
        }

        function addMember() {
            let u = document.getElementById('new-u').value.trim();
            if(!u || db[u]) return alert("Errore nome!");
            db[u] = { pass: u + "-01", grado: document.getElementById('new-g').value, mat: document.getElementById('new-m').value, ore: 0, warns: 0 };
            save(); refreshAdmList(); renderMatricole(); alert("Aggiunto!");
        }

        function loadStaffData() {
            let s = document.getElementById('s-sel').value;
            if(!db[s]) return;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-m').value = db[s].mat;
            document.getElementById('ed-h').value = db[s].ore;
        }

        function saveStaffData() {
            let s = document.getElementById('s-sel').value;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].mat = document.getElementById('ed-m').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); renderMatricole(); alert("Aggiornato!");
        }

        function changeWarns(v) {
            let s = document.getElementById('s-sel').value;
            if(!db[s]) return;
            db[s].warns = Math.max(0, (db[s].warns || 0) + v);
            save(); renderMatricole();
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            b.innerHTML = Object.keys(db).sort().map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td><td>${db[k].warns || 0}</td></tr>`).join('');
        }

        function refreshAdmList() {
            let s = document.getElementById('s-sel');
            s.innerHTML = '<option value="">Scegli...</option>' + Object.keys(db).map(k => `<option value="${k}">${k}</option>`).join('');
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('ITDR_V27_DB', JSON.stringify(db)); }
        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        window.onload = applyTheme;
    </script>
</body>
</html>
