<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSC Staff Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773080841/msb6eamry0kagf21gttx.png" class="login-logo">
            <h2>Accedi al Portale</h2>
            <input type="text" id="username" placeholder="Nome Utente">
            <input type="password" id="password" placeholder="Password (es. D-101)">
            <button onclick="checkLogin()">ACCEDI</button>
            <p id="login-error" style="color: #ff4444; display:none; margin-top:15px; font-weight:bold;">Credenziali Errate!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <nav class="sidebar">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773080841/msb6eamry0kagf21gttx.png" class="nav-logo">
            <button onclick="showSection('servizio')"><i class="fas fa-clock"></i> Servizio</button>
            <button onclick="showSection('matricole')"><i class="fas fa-list"></i> Lista Staff</button>
            <button id="nav-admin" onclick="showSection('admin-panel')" style="display:none; color: #ff4444; border: 1px solid #ff4444; margin-top: 20px;">
                <i class="fas fa-user-shield"></i> ADMIN PANEL
            </button>
            <button onclick="location.reload()" style="margin-top: auto; color: #888;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>

        <main class="content">
            <section id="servizio" class="tab-content">
                <div class="card profile-card">
                    <h1 id="staffer-name">NOME UTENTE</h1>
                    <p id="staffer-grade">Grado Staff</p>
                    <div class="stats-grid">
                        <div class="stat-item">ID: <span id="staffer-id">ITD-00</span></div>
                        <div class="stat-item">Richiami: <span id="staffer-warns">0</span></div>
                        <div class="stat-item">Totale Ore: <span id="staffer-logs">0h 0m</span></div>
                    </div>
                </div>

                <div class="card timer-card">
                    <div id="timer-display">00:00:00</div>
                    <div class="timer-controls">
                        <button id="btn-start" onclick="startService()" class="btn-primary">INIZIA SERVIZIO</button>
                        <button id="btn-stop" onclick="stopService()" class="btn-danger" style="display:none;">FINE SERVIZIO</button>
                    </div>
                </div>
            </section>

            <section id="matricole" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>Elenco Personale ITD</h3>
                    <table class="staff-table">
                        <thead>
                            <tr><th>Matricola</th><th>Nome</th><th>Grado</th></tr>
                        </thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="admin-panel" class="tab-content" style="display:none;">
                <div class="card admin-header">
                    <h2>Gestione Staff (Solo Autorizzati)</h2>
                </div>
                
                <div class="admin-grid">
                    <div class="card">
                        <h3>Aggiungi Nuovo</h3>
                        <input type="text" id="new-staff-name" placeholder="Nome">
                        <select id="new-staff-grade"></select>
                        <input type="text" id="new-staff-pass" placeholder="Password (es. X-123)">
                        <button onclick="addNewStaff()" class="btn-primary">SALVA</button>
                    </div>

                    <div class="card">
                        <h3>Azioni Rapide</h3>
                        <select id="select-staff-admin"></select>
                        <div class="btn-group">
                            <button onclick="modifyWarn(1)" class="btn-danger">+1 Richiamo</button>
                            <button onclick="modifyWarn(-1)" class="btn-warn">-1 Richiamo</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>Report Ore Totali</h3>
                    <table class="staff-table">
                        <thead>
                            <tr><th>Nome</th><th>Grado</th><th>Richiami</th><th>Ore</th></tr>
                        </thead>
                        <tbody id="admin-hours-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
