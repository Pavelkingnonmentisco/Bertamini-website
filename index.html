<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSC Staff Portal - Secure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773080841/msb6eamry0kagf21gttx.png" class="login-logo">
            <h2>Area Riservata Staff</h2>
            <input type="text" id="username" placeholder="Nome Staff">
            <input type="password" id="password" placeholder="Password (Es: D-123)">
            <button onclick="checkLogin()">Accedi</button>
            <p id="login-error" style="color: #ff4444; display:none; margin-top:10px;">Credenziali errate!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <nav class="sidebar">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773080841/msb6eamry0kagf21gttx.png" class="nav-logo">
            <button onclick="showSection('servizio')"><i class="fas fa-clock"></i> Servizio</button>
            <button onclick="showSection('matricole')"><i class="fas fa-list"></i> Lista Staff</button>
            <button id="nav-admin" onclick="showSection('admin-panel')" style="display:none; color: #ff4444; border: 1px solid #ff4444; margin-top: 15px;">
                <i class="fas fa-user-shield"></i> ADMIN PANEL
            </button>
        </nav>

        <main class="content">
            <section id="servizio" class="tab-content">
                <div class="info-card">
                    <h2 id="staffer-name">---</h2>
                    <p id="staffer-grade">---</p>
                    <div class="info-stats">
                        <div class="stat-box">Richiami: <span id="staffer-warns">0</span></div>
                        <div class="stat-box">Ore: <span id="staffer-logs">0h 0m</span></div>
                    </div>
                </div>
                <div class="timer-card">
                    <div id="timer-display">00:00:00</div>
                    <button id="btn-start" onclick="startService()" class="btn-main">ENTRA IN SERVIZIO</button>
                    <button id="btn-stop" onclick="stopService()" class="btn-danger" style="display:none;">ESCI DAL SERVIZIO</button>
                </div>
            </section>

            <section id="admin-panel" class="tab-content" style="display:none;">
                <div class="info-card">
                    <h3>Aggiungi Staffer</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="text" id="new-staff-name" placeholder="Nome">
                        <select id="new-staff-grade"></select>
                        <input type="text" id="new-staff-pass" placeholder="Password (lascia vuoto per casuale)">
                        <button onclick="addNewStaff()" class="btn-main">SALVA</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <h3>Report Ore Totale</h3>
                    <table>
                        <thead><tr><th>Nome</th><th>Grado</th><th>Richiami</th><th>Ore</th></tr></thead>
                        <tbody id="admin-hours-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="matricole" class="tab-content" style="display:none;">
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>ID</th><th>Nome</th><th>Grado</th></tr></thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
