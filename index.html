<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ITDR STAFF PORTAL v13</title>
    <style>
        :root { --blue: #007bff; --dark: #051e34; --danger: #dc3545; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        
        /* Login */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(#012a4a, #000); }
        .box { background: var(--dark); padding: 30px; border-radius: 15px; border: 1px solid var(--blue); text-align: center; width: 350px; }
        
        /* Navbar */
        nav { background: var(--dark); padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--blue); }
        nav button { background: var(--blue); color: #fff; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-right: 5px; }
        
        /* Content */
        .container { padding: 30px; max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: var(--dark); padding: 20px; border-radius: 12px; border: 1px solid #102a43; text-align: center; }
        .card h3 { color: #00d4ff; margin: 0; font-size: 13px; text-transform: uppercase; }
        .card p { font-size: 26px; margin: 10px 0; font-weight: 800; }

        /* Admin Box */
        .admin-container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .admin-card { flex: 1; min-width: 300px; background: #0a2540; padding: 20px; border-radius: 10px; border: 1px solid #1a3a5a; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn-full { width: 100%; background: var(--blue); color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .btn-del { background: var(--danger); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="70">
            <h2>ITDR STAFF LOGIN</h2>
            <input type="text" id="user-in" placeholder="Nome Staff">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-full" onclick="tentaLogin()">ACCEDI</button>
            <p style="font-size: 10px; color: #666; margin-top: 15px;">© Sviluppato da Pavel</p>
        </div>
    </div>

    <div id="main-portal" class="hidden">
        <nav>
            <div>
                <button onclick="pagine('p-area')">AREA PERSONALE</button>
                <button onclick="pagine('p-turni')">TURNI</button>
                <button id="btn-admin" class="hidden" onclick="pagine('p-admin')" style="background: #f39c12;">PANNELLO STAFF</button>
            </div>
            <button onclick="location.reload()" style="background: var(--danger);">ESCI</button>
        </nav>

        <div class="container">
            <section id="p-area">
                <div class="grid">
                    <div class="card"><h3>GRADO</h3><p id="info-grado">-</p></div>
                    <div class="card"><h3>MATRICOLA</h3><p id="info-mat">-</p></div>
                    <div class="card"><h3>ORE TOTALI</h3><p id="info-ore">00:00:00</p></div>
                    <div class="card"><h3>RICHIAMI</h3><p id="info-warns" style="color:red">0</p></div>
                </div>
            </section>

            <section id="p-turni" class="hidden">
                <div class="card">
                    <h3>TIMER SERVIZIO</h3>
                    <h1 id="clock" style="font-size: 60px;">00:00:00</h1>
                    <button id="btn-timer" class="btn-full" onclick="azioneTimer()">INIZIA TURNO</button>
                </div>
            </section>

            <section id="p-admin" class="hidden">
                <div class="admin-container">
                    <div class="admin-card">
                        <h3>➕ ARRUOLA NUOVO STAFF</h3>
                        <input type="text" id="add-n" placeholder="Nome">
                        <input type="text" id="add-p" placeholder="Password">
                        <input type="text" id="add-g" placeholder="Grado">
                        <input type="text" id="add-m" placeholder="Matricola">
                        <button class="btn-full" onclick="creaStaff()">AGGIUNGI AL DATABASE</button>
                    </div>

                    <div class="admin-card">
                        <h3>⚙️ GESTISCI / RIMUOVI</h3>
                        <select id="lista-staff" onchange="datiStaff()"></select>
                        <div id="area-mod" class="hidden">
                            <input type="text" id="mod-g" placeholder="Cambia Grado">
                            <input type="text" id="mod-m" placeholder="Cambia Matricola">
                            <button class="btn-full" onclick="salvaMod()">SALVA DATI</button>
                            <button class="btn-full btn-del" onclick="eliminaStaff()">RIMUOVI MEMBRO DAL SITO</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE
        const ADMIN_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel", "Diego"];
        let db = JSON.parse(localStorage.getItem('ITDR_V13_STORAGE')) || {};
        let loggato = ""; let sec = 0; let tInterval = null; let attivo = false;

        // Reset Database Iniziale
        if (Object.keys(db).length === 0) {
            ADMIN_LIST.forEach(n => {
                db[n] = { pass: n + "-01", grado: "Admin", mat: "ITD-00", ore: 0, warns: 0 };
            });
            save();
        }

        function tentaLogin() {
            let u = document.getElementById('user-in').value;
            let p = document.getElementById('pass-in').value;
            if (db[u] && db[u].pass === p) {
                loggato = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-portal').classList.remove('hidden');
                if (ADMIN_LIST.includes(u)) {
                    document.getElementById('btn-admin').classList.remove('hidden');
                    popolaLista();
                }
                updateArea();
            } else { alert("NOME O PASSWORD ERRATI!"); }
        }

        function updateArea() {
            document.getElementById('info-grado').innerText = db[loggato].grado;
            document.getElementById('info-mat').innerText = db[loggato].mat;
            document.getElementById('info-warns').innerText = db[loggato].warns;
            document.getElementById('info-ore').innerText = formatTime(db[loggato].ore);
        }

        function azioneTimer() {
            let b = document.getElementById('btn-timer');
            if (!attivo) {
                attivo = true; b.innerText = "FINE SERVIZIO"; b.style.background = "red";
                tInterval = setInterval(() => { sec++; document.getElementById('clock').innerText = formatTime(sec); }, 1000);
            } else {
                attivo = false; b.innerText = "INIZIA TURNO"; b.style.background = "#007bff";
                clearInterval(tInterval);
                db[loggato].ore += sec; sec = 0; save(); updateArea();
                document.getElementById('clock').innerText = "00:00:00";
            }
        }

        // FUNZIONI ADMIN
        function creaStaff() {
            let n = document.getElementById('add-n').value;
            if (!n) return alert("Inserisci il nome!");
            db[n] = {
                pass: document.getElementById('add-p').value,
                grado: document.getElementById('add-g').value,
                mat: document.getElementById('add-m').value,
                ore: 0, warns: 0
            };
            save(); popolaLista(); alert("Nuovo staff aggiunto!");
        }

        function eliminaStaff() {
            let s = document.getElementById('lista-staff').value;
            if (s === loggato) return alert("Non puoi cancellarti da solo!");
            if (confirm("Vuoi davvero rimuovere " + s + " dal sito?")) {
                delete db[s]; save(); popolaLista();
                document.getElementById('area-mod').classList.add('hidden');
            }
        }

        function datiStaff() {
            let s = document.getElementById('lista-staff').value;
            if (!s) return document.getElementById('area-mod').classList.add('hidden');
            document.getElementById('area-mod').classList.remove('hidden');
            document.getElementById('mod-g').value = db[s].grado;
            document.getElementById('mod-m').value = db[s].mat;
        }

        function salvaMod() {
            let s = document.getElementById('lista-staff').value;
            db[s].grado = document.getElementById('mod-g').value;
            db[s].mat = document.getElementById('mod-m').value;
            save(); alert("Dati aggiornati!"); updateArea();
        }

        function popolaLista() {
            let select = document.getElementById('lista-staff');
            select.innerHTML = '<option value="">-- Seleziona Staff --</option>';
            Object.keys(db).sort().forEach(n => { select.innerHTML += `<option value="${n}">${n}</option>`; });
        }

        function formatTime(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('ITDR_V13_STORAGE', JSON.stringify(db)); }
        function pagine(id) {
            ["p-area", "p-turni", "p-admin"].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
